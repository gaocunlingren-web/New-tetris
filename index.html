<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テトリス改</title>

<style>
body {
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#container {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:20px;
    margin-top:20px;
}

canvas {
    background:black;
}

.side {
    display:flex;
    flex-direction:column;
    gap:20px;
}
</style>
</head>

<body>

<h1>テトリス改</h1>
<p>← → 移動 / ↑ 回転 / ↓ 加速 / Space ハードドロップ / C HOLD</p>

<div id="container">

    <div class="side">
        <h3>HOLD</h3>
        <canvas id="hold" width="120" height="120"></canvas>
    </div>

    <canvas id="game" width="300" height="600"></canvas>

    <div class="side">
        <h3>NEXT</h3>
        <canvas id="next" width="120" height="120"></canvas>
    </div>

</div>

<p id="score">SCORE: 0</p>

<script>
// =====================
// 基本設定
// =====================
const COLS = 10;
const ROWS = 20;
const SIZE = 30;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const holdCanvas = document.getElementById("hold");
const holdCtx = holdCanvas.getContext("2d");

const nextCanvas = document.getElementById("next");
const nextCtx = nextCanvas.getContext("2d");

// =====================
// テトリミノ（正規7種）
// =====================
const SHAPES = [
    {shape:[[0,0],[1,0],[2,0],[4,0]], color:"cyan"},     // I
    {shape:[[0,0],[1,0],[0,1],[1,1],[2,0]], color:"yellow"},   // O
    {shape:[[0,0],[1,0],[2,0],[1,2]], color:"purple"},   // T
    {shape:[[0,0],[0,1],[1,1],[0,2],[0,3]], color:"orange"},   // L
    {shape:[[2,0],[0,1],[1,1],[2,1],[3,1]], color:"blue"},     // J
    {shape:[[1,0],[2,0],[0,1],[1,1],[1,2]], color:"green"},    // S
    {shape:[[0,0],[1,0],[1,1],[2,1],[2,2]], color:"red"}       // Z
];


// =====================
// 状態
// =====================
let board = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));

let current, next, hold = null;
let holdUsed = false;

let x = 3;
let y = 0;

let score = 0;

// =====================
// ピース生成
// =====================
function randomPiece(){
    return JSON.parse(JSON.stringify(SHAPES[Math.floor(Math.random()*7)]));
}

function spawn(){
    current = next || randomPiece();
    next = randomPiece();
    x = 3;
    y = 0;
    holdUsed = false;

    if(!canMove(x,y,current.shape)){
        alert("GAME OVER");
        board = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));
        score = 0;
    }
}

// =====================
// 移動判定
// =====================
function canMove(nx,ny,shape){
    return shape.every(([dx,dy])=>{
        let px = nx+dx;
        let py = ny+dy;

        if(px<0 || px>=COLS || py>=ROWS) return false;
        if(py>=0 && board[py][px]) return false;

        return true;
    });
}

// =====================
// 回転（壁蹴り）
// =====================
function rotate(){
    const rotated = current.shape.map(([x,y])=>[-y,x]);
    const kicks = [0,-1,1,-2,2];

    for(let k of kicks){
        if(canMove(x+k,y,rotated)){
            current.shape = rotated;
            x += k;
            return;
        }
    }
}

// =====================
// 固定
// =====================
function freeze(){
    current.shape.forEach(([dx,dy])=>{
        board[y+dy][x+dx] = current.color;
    });

    clearLines();
    spawn();
}

// =====================
// ライン消去
// =====================
function clearLines(){
    board = board.filter(row=>!row.every(v=>v));

    while(board.length<ROWS){
        board.unshift(Array(COLS).fill(0));
        score += 100;
    }

    document.getElementById("score").innerText = "SCORE: " + score;
}

// =====================
// 落下
// =====================
function drop(){
    if(canMove(x,y+1,current.shape)){
        y++;
    } else {
        freeze();
    }
}

// =====================
// HOLD
// =====================
function holdPiece(){
    if(holdUsed) return;

    if(hold === null){
        hold = current;
        spawn();
    } else {
        let tmp = current;
        current = hold;
        hold = tmp;
        x = 3;
        y = 0;
    }

    holdUsed = true;
}

// =====================
// 描画
// =====================
function draw(){
    ctx.clearRect(0,0,300,600);

    // board
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            if(board[r][c]){
                ctx.fillStyle = board[r][c];
                ctx.fillRect(c*SIZE,r*SIZE,SIZE,SIZE);
            }
        }
    }

    // current
    ctx.fillStyle = current.color;
    current.shape.forEach(([dx,dy])=>{
        ctx.fillRect((x+dx)*SIZE,(y+dy)*SIZE,SIZE,SIZE);
    });

    drawMini(holdCtx, hold);
    drawMini(nextCtx, next);
}

// =====================
// ミニ表示
// =====================
function drawMini(ctxMini, piece){
    ctxMini.clearRect(0,0,120,120);
    if(!piece) return;

    ctxMini.fillStyle = piece.color;
    piece.shape.forEach(([x,y])=>{
        ctxMini.fillRect(x*20+20,y*20+20,20,20);
    });
}

// =====================
// 操作
// =====================
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft" && canMove(x-1,y,current.shape)) x--;
    if(e.key==="ArrowRight" && canMove(x+1,y,current.shape)) x++;
    if(e.key==="ArrowDown") drop();
    if(e.key==="ArrowUp") rotate();

    if(e.code==="Space"){
        while(canMove(x,y+1,current.shape)) y++;
        freeze();
    }

    if(e.key==="c") holdPiece();
});

// =====================
// ループ
// =====================
spawn();

setInterval(()=>{
    drop();
    draw();
},500);

</script>

</body>
</html>
