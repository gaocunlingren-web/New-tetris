<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テトリス改</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden; /* スクロール完全禁止 */
}

body {
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* 画面全体を使う */
#gameScreen {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#container {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

/* HOLD / NEXT */
#topPanel {
    display:flex;
    flex-direction:column;
    gap:10px;
}

canvas {
    background:black;
}

h1 {
    margin:5px;
    font-size:18px;
}

p {
    margin:3px;
    font-size:12px;
}

button {
    font-size:14px;
    padding:8px;
    margin:3px;
}

/* スマホ */
@media (max-width: 800px) {
    #container {
        flex-direction: column;
    }

    #topPanel {
        flex-direction: row;
        justify-content:center;
    }
}
</style>

</head>

<body>

<h1>テトリス改</h1>

<div id="startScreen">
    <button onclick="startGame()">START</button>
</div>

<div id="gameScreen" style="display:none;">

```
<div id="container">

    <div id="topPanel">
        <div>
          <h3>HOLD</h3>
          <canvas id="hold"></canvas>
        </div>

        <div>
          <h3>NEXT</h3>
          <canvas id="next"></canvas>
        </div>

    </div>

    <canvas id="game"></canvas>
</div>

<p id="score">SCORE: 0</p>

<div>
    <button onclick="moveLeft()">←</button>
    <button onclick="rotatePiece()">⟳</button>
    <button onclick="moveRight()">→</button>
    <button onclick="dropPiece()">↓</button>
    <button onclick="hardDrop()">⤓</button>
    <button onclick="holdPiece()">H</button>
</div>
```
</div>

<script>
const COLS = 10;
const ROWS = 20;

/* ★ 完全フィット計算（これが重要） */
const uiHeight = 140; // タイトル・ボタン分
const maxWidth = window.innerWidth * 0.9;
const maxHeight = window.innerHeight - uiHeight;

const SIZE = Math.floor(Math.min(
    maxWidth / COLS,
    maxHeight / ROWS
));

const canvas = document.getElementById("game");
canvas.width = SIZE * COLS;
canvas.height = SIZE * ROWS;
const ctx = canvas.getContext("2d");

const holdCanvas = document.getElementById("hold");
holdCanvas.width = SIZE * 4;
holdCanvas.height = SIZE * 4;
const holdCtx = holdCanvas.getContext("2d");

const nextCanvas = document.getElementById("next");
nextCanvas.width = SIZE * 4;
nextCanvas.height = SIZE * 4;
const nextCtx = nextCanvas.getContext("2d");

const SHAPES = [
    {shape:[[0,0],[1,0],[2,0],[4,0]], color:"cyan"},
    {shape:[[0,0],[1,0],[0,1],[1,1],[2,0]], color:"yellow"},
    {shape:[[0,0],[1,0],[2,0],[1,2]], color:"purple"},
    {shape:[[0,0],[0,1],[1,1],[0,2],[0,3]], color:"orange"},
    {shape:[[2,0],[0,1],[1,1],[2,1],[3,1]], color:"blue"},
    {shape:[[1,0],[2,0],[0,1],[1,1],[1,2]], color:"green"},
    {shape:[[0,0],[1,0],[1,1],[2,1],[2,2]], color:"red"}
];

let board, current, next, hold;
let holdUsed;
let x, y;
let score;
let gameStarted = false;

function resetGame(){
    board = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));
    hold = null;
    next = randomPiece();
    holdUsed = false;
    x = 3;
    y = 0;
    score = 0;
    updateScore();
}

function updateScore(){
    document.getElementById("score").innerText = "SCORE: " + score;
}

function startGame(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";

    gameStarted = true;
    resetGame();
    spawn();
    draw();
}

function gameOver(){
    alert("GAME OVER");
    location.reload();
}

function randomPiece(){
    return JSON.parse(JSON.stringify(SHAPES[Math.floor(Math.random()*7)]));
}

function spawn(){
    current = next;
    next = randomPiece();

    x = 3;
    y = 0;
    holdUsed = false;

    if(!canMove(x,y,current.shape)){
        gameOver();
    }
}

function canMove(nx,ny,shape){
    return shape.every(([dx,dy])=>{
        let px = nx+dx;
        let py = ny+dy;

        if(px<0 || px>=COLS || py>=ROWS) return false;
        if(py>=0 && board[py][px]) return false;
        return true;
    });
}

function rotate(){
    const rotated = current.shape.map(([dx,dy])=>[-dy,dx]);
    const kicks = [0,-1,1,-2,2];

    for(let k of kicks){
        if(canMove(x+k,y,rotated)){
            current.shape = rotated;
            x += k;
            return;
        }
    }
}

function freeze(){
    current.shape.forEach(([dx,dy])=>{
        board[y+dy][x+dx] = current.color;
    });

    clearLines();
    spawn();
}

function clearLines(){
    let lines = 0;

    board = board.filter(row=>{
        if(row.every(v=>v)){
            lines++;
            return false;
        }
        return true;
    });

    while(board.length<ROWS){
        board.unshift(Array(COLS).fill(0));
    }

    score += lines * 100;
    updateScore();
}

function drop(){
    if(canMove(x,y+1,current.shape)){
        y++;
    } else {
        freeze();
    }
}

function holdPiece(){
    if(holdUsed) return;

    if(hold === null){
        hold = current;
        spawn();
    } else {
        [current, hold] = [hold, current];
        x = 3;
        y = 0;
    }

    holdUsed = true;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            if(board[r][c]){
                ctx.fillStyle = board[r][c];
                ctx.fillRect(c*SIZE,r*SIZE,SIZE,SIZE);
            }
        }
    }

    ctx.fillStyle = current.color;
    current.shape.forEach(([dx,dy])=>{
        ctx.fillRect((x+dx)*SIZE,(y+dy)*SIZE,SIZE,SIZE);
    });

    drawMini(holdCtx, hold);
    drawMini(nextCtx, next);
}

function drawMini(ctxMini, piece){
    ctxMini.clearRect(0,0,holdCanvas.width,holdCanvas.height);
    if(!piece) return;

    ctxMini.fillStyle = piece.color;
    piece.shape.forEach(([x,y])=>{
        ctxMini.fillRect(x*SIZE/1.5+5,y*SIZE/1.5+5,SIZE/1.5,SIZE/1.5);
    });
}

function moveLeft(){ if(canMove(x-1,y,current.shape)) x--; draw(); }
function moveRight(){ if(canMove(x+1,y,current.shape)) x++; draw(); }
function rotatePiece(){ rotate(); draw(); }
function dropPiece(){ drop(); draw(); }
function hardDrop(){ while(canMove(x,y+1,current.shape)) y++; freeze(); draw(); }

document.addEventListener("keydown",e=>{
    if(!gameStarted) return;

    if(e.key==="ArrowLeft") moveLeft();
    if(e.key==="ArrowRight") moveRight();
    if(e.key==="ArrowDown") dropPiece();
    if(e.key==="ArrowUp") rotatePiece();
    if(e.code==="Space") hardDrop();
    if(e.key==="c") holdPiece();
});

setInterval(()=>{
    if(!gameStarted) return;
    drop();
    draw();
},500);

</script>

</body>
</html>
