<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover">

<title>テトリス改</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;

    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}

body {
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    height: 100vh;
}

#gameScreen {
    flex:1;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    width:100%;
    height:100vh;
}

#container {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

#topPanel {
    display:flex;
    flex-direction:column;
    gap:10px;
}

#topPanel div {
    display:flex;
    flex-direction:column;
    align-items:center;
}

canvas {
    background:black;
    display:block;
}

h1 {
    margin:5px;
    font-size:16px;
}

p {
    margin:3px;
    font-size:12px;
}

#controls {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:none;
    flex-wrap:wrap;
    justify-content:center;
    padding:5px 0;
    padding-bottom: env(safe-area-inset-bottom);
}

button {
    font-size:14px;
    padding:8px;
    margin:3px;

    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
</style>
</head>

<body>

<h1>テトリス改</h1>

<div id="startScreen">
    <button onclick="startGame()">START</button>
</div>

<div id="gameScreen">

<div id="container">

<div id="topPanel">
    <div>
        <h3>HOLD</h3>
        <canvas id="hold"></canvas>
    </div>

    <div>
        <h3>NEXT</h3>
        <canvas id="next"></canvas>
    </div>
</div>

<canvas id="game"></canvas>

</div>

<p id="score">SCORE: 0</p>

</div>

<div id="controls">
    <button onclick="moveLeft()">←</button>
    <button onclick="rotatePiece()">⟳</button>
    <button onclick="moveRight()">→</button>
    <button onclick="dropPiece()">↓</button>
    <button onclick="hardDrop()">⤓</button>
    <button onclick="holdPiece()">H</button>
</div>

<script>

/* ===== ズーム防止 ===== */
document.addEventListener("touchstart",e=>{
    if(e.touches.length>1) e.preventDefault();
},{passive:false});

document.addEventListener("gesturestart",e=>{
    e.preventDefault();
});

const COLS=10;
const ROWS=20;

let SIZE=20;

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const holdCanvas=document.getElementById("hold");
const holdCtx=holdCanvas.getContext("2d");

const nextCanvas=document.getElementById("next");
const nextCtx=nextCanvas.getContext("2d");

/* ===== サイズ ===== */
function getVH(){
    return Math.min(window.innerHeight,document.documentElement.clientHeight);
}

function calculateSize(){
    const usedHeight=200;

    const vh=getVH();
    const maxWidth=window.innerWidth*0.95;
    const maxHeight=vh-usedHeight;

    SIZE=Math.floor(Math.min(
        maxWidth/COLS,
        maxHeight/ROWS
    ));

    SIZE=Math.max(12,SIZE);
}

function applyCanvasSize(){
    canvas.width=SIZE*COLS;
    canvas.height=SIZE*ROWS;

    canvas.style.width=(SIZE*COLS)+"px";
    canvas.style.height=(SIZE*ROWS)+"px";

    holdCanvas.width=SIZE*4;
    holdCanvas.height=SIZE*4;

    nextCanvas.width=SIZE*4;
    nextCanvas.height=SIZE*4;
}

/* ===== ゲーム本体 ===== */
const SHAPES = [
    {shape:[[0,0],[1,0],[2,0],[4,0]], color:"cyan"},
    {shape:[[0,0],[1,0],[0,1],[1,1],[2,0]], color:"yellow"},
    {shape:[[0,0],[1,0],[2,0],[1,2]], color:"purple"},
    {shape:[[0,0],[0,1],[1,1],[0,2],[0,3]], color:"orange"},
    {shape:[[2,0],[0,1],[1,1],[2,1],[3,1]], color:"blue"},
    {shape:[[1,0],[2,0],[0,1],[1,1],[1,2]], color:"green"},
    {shape:[[0,0],[1,0],[1,1],[2,1],[2,2]], color:"red"}
];

let board,current,next,hold;
let holdUsed;
let x,y;
let score;
let gameStarted=false;

/* ===== 回転 ===== */
function rotate(){
    const rotated=current.shape.map(([dx,dy])=>[-dy,dx]);
    const kicks=[0,-1,1,-2,2];

    for(let k of kicks){
        if(canMove(x+k,y,rotated)){
            current.shape=rotated;
            x+=k;
            return;
        }
    }
}

/* ===== ゲーム ===== */
function resetGame(){
    board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    hold=null;
    next=randomPiece();
    holdUsed=false;
    x=3;
    y=0;
    score=0;
    updateScore();
}

function updateScore(){
    document.getElementById("score").innerText="SCORE: "+score;
}

function startGame(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("gameScreen").style.display="flex";
    document.getElementById("controls").style.display="flex";

    gameStarted=true;
    resetGame();
    spawn();

    requestAnimationFrame(()=>{
        calculateSize();
        applyCanvasSize();
        draw();
    });
}

function gameOver(){
    alert("GAME OVER");
    gameStarted=false;

    document.getElementById("startScreen").style.display="block";
    document.getElementById("gameScreen").style.display="none";
    document.getElementById("controls").style.display="none";
}

function randomPiece(){
    return JSON.parse(JSON.stringify(SHAPES[Math.floor(Math.random()*7)]));
}

function spawn(){
    current=next;
    next=randomPiece();

    x=3;
    y=0;
    holdUsed=false;

    if(!canMove(x,y,current.shape)) gameOver();
}

function canMove(nx,ny,shape){
    return shape.every(([dx,dy])=>{
        let px=nx+dx;
        let py=ny+dy;

        if(px<0||px>=COLS||py>=ROWS) return false;
        if(py>=0&&board[py][px]) return false;
        return true;
    });
}

function freeze(){
    current.shape.forEach(([dx,dy])=>{
        board[y+dy][x+dx]=current.color;
    });

    clearLines();
    spawn();
}

function clearLines(){
    let lines=0;

    board=board.filter(r=>{
        if(r.every(v=>v)){
            lines++;
            return false;
        }
        return true;
    });

    while(board.length<ROWS){
        board.unshift(Array(COLS).fill(0));
    }

    score+=lines*100;
    updateScore();
}

function drop(){
    if(canMove(x,y+1,current.shape)) y++;
    else freeze();
}

/* ===== ホールド ===== */
function holdPiece(){
    if(holdUsed) return;

    if(hold===null){
        hold=current;
        spawn();
    }else{
        [current,hold]=[hold,current];
        x=3;
        y=0;
    }

    holdUsed=true;
    draw();
}

/* ===== 描画 ===== */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            if(board[r][c]){
                ctx.fillStyle=board[r][c];
                ctx.fillRect(c*SIZE,r*SIZE,SIZE,SIZE);
            }
        }
    }

    ctx.fillStyle=current.color;
    current.shape.forEach(([dx,dy])=>{
        ctx.fillRect((x+dx)*SIZE,(y+dy)*SIZE,SIZE,SIZE);
    });

    drawMini(holdCtx,hold,holdCanvas);
    drawMini(nextCtx,next,nextCanvas);
}

function drawMini(ctxMini,piece,canvasMini){
    ctxMini.clearRect(0,0,canvasMini.width,canvasMini.height);
    if(!piece) return;

    ctxMini.fillStyle=piece.color;

    piece.shape.forEach(([x,y])=>{
        ctxMini.fillRect(
            x*SIZE/2 + SIZE,
            y*SIZE/2 + SIZE,
            SIZE/2,
            SIZE/2
        );
    });
}

/* ===== 操作 ===== */
function moveLeft(){ if(canMove(x-1,y,current.shape)) x--; draw(); }
function moveRight(){ if(canMove(x+1,y,current.shape)) x++; draw(); }
function rotatePiece(){ rotate(); draw(); }
function dropPiece(){ drop(); draw(); }
function hardDrop(){ while(canMove(x,y+1,current.shape)) y++; freeze(); draw(); }

/* ===== キーボード（★ここが追加修正） ===== */
document.addEventListener("keydown",e=>{
    if(!gameStarted) return;

    if(e.key==="ArrowLeft") moveLeft();
    if(e.key==="ArrowRight") moveRight();
    if(e.key==="ArrowDown") dropPiece();
    if(e.key==="ArrowUp") rotatePiece();
    if(e.code==="Space") hardDrop();

    // ★ホールド追加（ここ重要）
    if(e.key==="c" || e.key==="C" || e.key==="h" || e.key==="H") holdPiece();
});

/* ===== resize ===== */
window.addEventListener("resize",()=>{
    if(!gameStarted) return;

    calculateSize();
    applyCanvasSize();
    draw();
});

/* ===== 落下 ===== */
setInterval(()=>{
    if(!gameStarted) return;
    drop();
    draw();
},500);

</script>

</body>
</html>
